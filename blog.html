<head>

<style>
  :root{
    --bg:#07070a;--surface:rgba(16,16,22,.7);--surface-hover:rgba(20,20,28,.8);--bubble:rgba(20,20,27,.85);--nav-bg:rgba(14,14,18,.5);

    --on-accent:#07070a;--invert-bg:#ededf2;--invert-fg:#07070a;--dot:#33333f;--scroll:#23232c;--scrim:rgba(5,5,8,.78);
    --w025:rgba(255,255,255,.025);--w03:rgba(255,255,255,.03);--w04:rgba(255,255,255,.04);--w05:rgba(255,255,255,.05);--w06:rgba(255,255,255,.06);--w07:rgba(255,255,255,.07);--w08:rgba(255,255,255,.08);--w09:rgba(255,255,255,.09);--w10:rgba(255,255,255,.1);--w12:rgba(255,255,255,.12);--w14:rgba(255,255,255,.14);--w30:rgba(255,255,255,.3);
  }
  :root[data-av-theme="light"]{
    --bg:#f4f4f7;--surface:rgba(255,255,255,.78);--surface-hover:rgba(255,255,255,.96);--bubble:rgba(255,255,255,.86);--nav-bg:rgba(255,255,255,.6);
    --text:#1c1c22;--text-2:#44444f;--text-3:#5c5c68;--text-4:#6f6f7b;--faint:#9a9aa6;--heading:#0a0a12;
    --on-accent:#07070a;--invert-bg:#18181b;--invert-fg:#fafafa;--dot:#c4c4cc;--scroll:#c8c8d0;--scrim:rgba(244,244,247,.72);
    --w025:rgba(0,0,0,.04);--w03:rgba(0,0,0,.05);--w04:rgba(0,0,0,.05);--w05:rgba(0,0,0,.06);--w06:rgba(0,0,0,.07);--w07:rgba(0,0,0,.08);--w08:rgba(0,0,0,.09);--w09:rgba(0,0,0,.1);--w10:rgba(0,0,0,.11);--w12:rgba(0,0,0,.13);--w14:rgba(0,0,0,.16);--w30:rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;background-color:var(--bg);transition:background-color .35s ease}
  html body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;transition:background-color .35s ease,color .35s ease}
  ::selection{background:rgba(124,108,255,.32)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:2px solid var(--bg)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatGlow{0%,100%{transform:translate(0,0) scale(1);opacity:.55}50%{transform:translate(30px,-24px) scale(1.08);opacity:.8}}
  @keyframes floatGlow2{0%,100%{transform:translate(0,0) scale(1);opacity:.4}50%{transform:translate(-28px,26px) scale(1.12);opacity:.65}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  /* Responsive — added for real-site deployment (source had no media queries) */
  @media (max-width:640px){
    .bloggrid{grid-template-columns:1fr !important}
    .nav-link{display:none !important}
    #cur-ring,#cur-dot{display:none !important}
  }
</style>

<body>

<div id="av-root" style="position:relative;min-height:100vh;overflow:hidden">

  <!-- custom cursor -->

  <!-- ambient glows -->
  <div style="position:fixed;top:-180px;left:8%;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(124,108,255,.26),transparent 70%);filter:blur(40px);pointer-events:none;animation:floatGlow 16s ease-in-out infinite;z-index:0"></div>
  <div style="position:fixed;bottom:-160px;right:4%;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.18),transparent 70%);filter:blur(40px);pointer-events:none;animation:floatGlow2 19s ease-in-out infinite;z-index:0"></div>
  <div style="position:fixed;inset:0;background-image:radial-gradient(var(--w025) 1px,transparent 1px);background-size:42px 42px;pointer-events:none;z-index:0"></div>

  <!-- NAV -->
  <nav style="position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px 20px">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1140px;padding:10px 14px 10px 18px;background:var(--nav-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--w07);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)">
        <span style="display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#7c6cff,#38bdf8);font-size:13px;font-weight:600;color:var(--on-accent)">AV</span>
        <span style="font-weight:500;letter-spacing:-.02em;font-size:15px">Apoorva Verma</span>
      </a>
      <div style="display:flex;align-items:center;gap:4px">
        <a class="nav-link" href="index.html#projects" style="text-decoration:none;color:var(--text-3);font-size:13.5px;padding:7px 12px;border-radius:9px;transition:color .2s" data-hover="color:var(--text)">Projects</a>
        <a class="nav-link" href="index.html#eval" style="text-decoration:none;color:var(--text-3);font-size:13.5px;padding:7px 12px;border-radius:9px;transition:color .2s" data-hover="color:var(--text)">Evaluation</a>
        <a class="nav-link" href="blog.html" style="text-decoration:none;color:var(--text);font-size:13.5px;padding:7px 12px;border-radius:9px">Writing</a>
        <button id="theme-btn" onclick="App.toggleTheme()" aria-label="Toggle theme" style="display:grid;place-items:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--w10);background:var(--w03);color:var(--text-3);cursor:pointer;font-size:14px;transition:color .18s,border-color .18s,background .18s" data-hover="color:var(--text);border-color:var(--w30)">☀</button>
        <a href="index.html#contact" style="text-decoration:none;color:var(--invert-fg);font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:9px;background:var(--invert-bg);margin-left:6px;transition:transform .2s" data-hover="transform:translateY(-1px)">Contact</a>
      </div>
    </div>
  </nav>

  <main style="position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px">

    <!-- HEADER -->
    <header style="padding:150px 0 50px">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:13px;color:var(--text-3);padding:7px 13px;border-radius:10px;border:1px solid var(--w10);background:var(--w03);transition:all .18s;animation:fadeUp .5s ease both" data-hover="color:var(--heading);border-color:var(--w30)">← Home</a>
      <div style="margin-top:26px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#7c6cff;letter-spacing:.08em;animation:fadeUp .5s .05s ease both">// WRITING</div>
      <h1 style="margin-top:10px;font-size:clamp(38px,6vw,64px);font-weight:200;letter-spacing:-.045em;line-height:1.04;animation:fadeUp .5s .1s ease both">Notes on grounding<br/>&amp; evaluation</h1>
      <p style="margin-top:18px;max-width:560px;font-size:16px;line-height:1.6;color:var(--text-4);animation:fadeUp .5s .15s ease both">Field notes on building RAG systems that don't hallucinate — and the evaluation harnesses that prove it.</p>
    </header>

    <!-- POST LIST (rendered by JS) -->
    <section style="padding:20px 0 120px">
      <div id="av-bloggrid" class="bloggrid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:18px"></div>
    </section>

  </main>

  <!-- ARTICLE OVERLAY (rendered by JS) -->
  <div id="av-overlay"></div>

</div>

<script>
(function(){
  "use strict";

  var posts = [
    {
      id: "p1",
      title: "Why your RAG demo lies to you",
      excerpt: "Fluent answers feel right and measure nothing. Here's how I separate confidence from correctness.",
      date: "May 2026", read: "6 min read",
      tags: ["RAG", "LLM Evaluation"],
      body: [
        "The most dangerous thing about a retrieval-augmented generation demo is that it sounds correct. Fluency is cheap; the model will happily produce a polished paragraph whether or not the retrieved context actually supports it. If you ship on vibes, you ship hallucinations with great grammar.",
        "Faithfulness is the metric that catches this: it asks whether every claim in the answer is entailed by the retrieved context, independent of how nice the prose is. In my own pipelines I score it on every response and treat anything under 0.9 as a defect, not a stylistic choice.",
        "The practical move is to decouple the two failure modes. Retrieval failures (the right chunk never made it into context) and generation failures (the chunk was there but the model embellished) need different fixes, and a single 'accuracy' number hides which one you have.",
        "So before you celebrate a demo, ask it the same question ten times with the context withheld. If it still answers confidently, you don't have a RAG system — you have a language model with a search box bolted on for decoration."
      ]
    },
    {
      id: "p2",
      title: "Semantic chunking won my ablation",
      excerpt: "Four chunking strategies, two embedding models, one clear winner. The numbers and why they moved.",
      date: "Apr 2026", read: "8 min read",
      tags: ["RAG", "Engineering"],
      body: [
        "Chunking is the least glamorous and most consequential knob in a RAG stack. I ran a full ablation — fixed-size, recursive, semantic, and sentence-window splitting — each paired with two embedding models, and scored faithfulness, answer relevance, and retrieval precision with RAGAS.",
        "Semantic chunking with text-embedding-3-large won decisively: 0.94 faithfulness against 0.81 for the naive fixed-512 baseline. The reason is intuitive in hindsight — splitting on meaning keeps a complete idea inside a single retrievable unit, so the model never has to stitch a claim across a boundary it can't see.",
        "Fixed-size chunking's failure mode is subtle. It looks fine on short factual questions and falls apart on anything requiring two adjacent sentences, because the split lands mid-thought and only half the evidence gets retrieved.",
        "The lesson I keep relearning: spend your optimization budget on retrieval quality before you reach for a bigger model. A sharper chunker beat a fancier LLM in every configuration I tested."
      ]
    },
    {
      id: "p3",
      title: "Calibrating LLM-as-judge",
      excerpt: "An automated judge is only as trustworthy as its agreement with humans. How I calibrate before I rely on it.",
      date: "Mar 2026", read: "7 min read",
      tags: ["LLM Evaluation"],
      body: [
        "Using an LLM to grade another LLM is enormously convenient and quietly perilous. Judges have biases — they favor longer answers, they anchor on the first option, and they're inconsistent across runs unless you pin them down.",
        "Before I trust a judge in a pipeline, I calibrate it against a human-labeled gold set and measure agreement with Cohen's kappa. If kappa is below 0.7, the judge isn't measuring what I think it is, and any score it produces downstream is theater.",
        "Two fixes carry most of the weight: force a rubric with explicit criteria instead of a vague 'rate 1–5', and randomize answer order to kill position bias. Pairwise comparison tends to be more stable than absolute scoring.",
        "A calibrated judge is a force multiplier — it lets you evaluate thousands of cases overnight. An uncalibrated one is a confident random number generator that happens to speak English."
      ]
    },
    {
      id: "p4",
      title: "Agents that recover instead of hallucinate",
      excerpt: "When a tool call fails, most agents invent a plausible result. Here's how to make yours notice and re-plan.",
      date: "Feb 2026", read: "5 min read",
      tags: ["AI Agents", "Engineering"],
      body: [
        "The failure mode that scares me most in agentic systems isn't a crash — it's a confident fabrication. A tool returns an error, and instead of stopping, the agent quietly invents what the result probably would have been and marches on.",
        "The fix is to make failure a first-class signal. Every tool response is validated against an expected schema; a malformed or empty result triggers a re-plan rather than a continuation. The agent is explicitly told it is allowed to say 'that didn't work.'",
        "Self-critique loops help too: after each step, a lightweight check asks whether the action actually advanced the goal. In my agent this lifted the recovery rate to 91% — the difference between a tool that's useful and one that's dangerous.",
        "Graceful degradation beats false confidence every time. An agent that admits uncertainty and asks for help is infinitely more shippable than one that hides its failures behind fluent prose."
      ]
    }
  ];

  var state = { activePost: null, theme: "dark" };

  function esc(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ---- hover handler (mouseenter/leave, append-and-restore) ----
  function bindHovers(scope){
    var els = scope.querySelectorAll("[data-hover]");
    for (var i=0;i<els.length;i++){
      (function(el){
        if (el.__hb) return; el.__hb = 1;
        var hov = el.getAttribute("data-hover");
        el.addEventListener("mouseenter", function(){
          if (el.__hovering) return;
          el.__hovering = 1;
          el.__base = el.getAttribute("style") || "";
          el.setAttribute("style", el.__base + ";" + hov);
        });
        el.addEventListener("mouseleave", function(){
          el.__hovering = 0;
          el.setAttribute("style", el.__base);
        });
      })(els[i]);
    }
  }

  // ---- post list ----
  function renderPosts(){
    var grid = document.getElementById("av-bloggrid");
    var html = "";
    for (var i=0;i<posts.length;i++){
      var p = posts[i];
      var tags = "";
      for (var j=0;j<p.tags.length;j++){
        tags += '<span style="font-size:11px;color:var(--text-3);padding:3px 10px;border-radius:999px;background:rgba(124,108,255,.08);border:1px solid rgba(124,108,255,.2)">'+esc(p.tags[j])+'</span>';
      }
      html += '<div data-reveal="1" onclick="App.openPost('+i+')" style="display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--w09);border-radius:16px;padding:26px;cursor:pointer;opacity:0;transform:translateY(24px);transition:transform .25s,border-color .25s,background .25s" data-hover="transform:translateY(-4px);border-color:rgba(124,108,255,.4);background:var(--surface-hover)">'
        + '<div style="display:flex;align-items:center;gap:10px;font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:var(--faint)"><span>'+esc(p.date)+'</span><span style="opacity:.5">·</span><span>'+esc(p.read)+'</span></div>'
        + '<h3 style="margin-top:14px;font-size:21px;font-weight:500;letter-spacing:-.025em;line-height:1.22;color:var(--text)">'+esc(p.title)+'</h3>'
        + '<p style="margin-top:10px;font-size:14.5px;line-height:1.6;color:var(--text-4);flex:1">'+esc(p.excerpt)+'</p>'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:18px">'
        +   '<div style="display:flex;flex-wrap:wrap;gap:6px">'+tags+'</div>'
        +   '<span style="font-size:13px;color:#7c6cff">→</span>'
        + '</div>'
        + '</div>';
    }
    grid.innerHTML = html;
    bindHovers(grid);
  }

  // ---- article overlay ----
  function renderOverlay(){
    var host = document.getElementById("av-overlay");
    var p = state.activePost;
    if (p == null){ host.innerHTML = ""; return; }
    var tags = "";
    for (var i=0;i<p.tags.length;i++){
      tags += '<span style="font-size:11.5px;color:var(--text-2);padding:4px 11px;border-radius:999px;background:rgba(124,108,255,.1);border:1px solid rgba(124,108,255,.25)">'+esc(p.tags[i])+'</span>';
    }
    var body = "";
    for (var k=0;k<p.body.length;k++){
      body += '<p style="font-size:16.5px;line-height:1.78;color:var(--text-2);letter-spacing:-.005em">'+esc(p.body[k])+'</p>';
    }
    host.innerHTML =
      '<div onclick="App.closePost()" style="position:fixed;inset:0;z-index:100;background:var(--scrim);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);overflow-y:auto;animation:overlayIn .25s ease both">'
      + '<div onclick="event.stopPropagation()" style="max-width:720px;margin:0 auto;padding:90px 24px 120px;animation:sheetIn .4s cubic-bezier(.22,1,.36,1) both">'
      +   '<button onclick="App.closePost()" style="display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:13px;color:var(--text-3);padding:8px 14px;border-radius:10px;border:1px solid var(--w12);background:var(--bubble);cursor:pointer;transition:all .18s" data-hover="color:var(--heading);border-color:var(--w30)">← Back to writing</button>'
      +   '<div style="display:flex;align-items:center;gap:10px;margin-top:30px;font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--faint)"><span>'+esc(p.date)+'</span><span style="opacity:.5">·</span><span>'+esc(p.read)+'</span></div>'
      +   '<h1 style="margin-top:14px;font-size:clamp(30px,5vw,46px);font-weight:200;letter-spacing:-.04em;line-height:1.08;color:var(--heading)">'+esc(p.title)+'</h1>'
      +   '<div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:18px">'+tags+'</div>'
      +   '<div style="margin-top:32px;height:1px;background:linear-gradient(90deg,rgba(124,108,255,.5),transparent)"></div>'
      +   '<article style="margin-top:30px;display:flex;flex-direction:column;gap:22px">'+body+'</article>'
      +   '<div style="margin-top:44px;padding-top:24px;border-top:1px solid var(--w08);display:flex;align-items:center;gap:12px">'
      +     '<span style="display:grid;place-items:center;width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#7c6cff,#38bdf8);font-size:14px;font-weight:600;color:var(--on-accent)">AV</span>'
      +     '<div><div style="font-size:14px;font-weight:500;color:var(--text)">Apoorva Verma</div><div style="font-size:12.5px;color:var(--faint)">AI Engineer — RAG &amp; LLM Evaluation</div></div>'
      +   '</div>'
      + '</div>'
      + '</div>';
    bindHovers(host);
  }

  // ---- theme ----
  var curTheme = "dark";
  function applyTheme(t){
    var light = t === "light";
    curTheme = light ? "light" : "dark";
    try {
      if (light) document.documentElement.setAttribute("data-av-theme", "light");
      else document.documentElement.removeAttribute("data-av-theme");
    } catch(e){}
    try { localStorage.setItem("av-theme", curTheme); } catch(e){}
    state.theme = curTheme;
    var btn = document.getElementById("theme-btn");
    if (btn) btn.textContent = curTheme === "light" ? "☾" : "☀";
  }
  function toggleTheme(){
    var cur = "dark";
    try { cur = document.documentElement.getAttribute("data-av-theme") === "light" ? "light" : "dark"; } catch(e){}
    applyTheme(cur === "light" ? "dark" : "light");
  }

  // ---- custom cursor ----
  function initCursor(){
    if (window.matchMedia && window.matchMedia("(pointer: coarse)").matches) return;
    var ring = document.getElementById("cur-ring"), dot = document.getElementById("cur-dot");
    if (!ring || !dot) return;
    var mx=-200,my=-200,rx=-200,ry=-200,shown=false,big=false,raf;
    function move(e){
      mx=e.clientX; my=e.clientY;
      dot.style.transform = "translate("+mx+"px,"+my+"px)";
      if (!shown){ shown=true; ring.style.opacity="1"; dot.style.opacity="1"; }
    }
    function setBig(on){
      if (on===big) return; big=on;
      ring.style.width = on?"52px":"34px";
      ring.style.height = on?"52px":"34px";
      ring.style.margin = on?"-26px 0 0 -26px":"-17px 0 0 -17px";
      ring.style.background = on?"rgba(124,108,255,.12)":"rgba(124,108,255,.05)";
      ring.style.borderColor = on?"rgba(168,156,255,.9)":"rgba(124,108,255,.6)";
    }
    function over(e){ setBig(!!(e.target.closest && e.target.closest('a,button,input,[role="button"]'))); }
    function leave(){ ring.style.opacity="0"; dot.style.opacity="0"; shown=false; }
    function loop(){
      rx += (mx-rx)*0.18; ry += (my-ry)*0.18;
      ring.style.transform = "translate("+rx.toFixed(2)+"px,"+ry.toFixed(2)+"px)";
      raf = requestAnimationFrame(loop);
    }
    window.addEventListener("mousemove", move, { passive:true });
    window.addEventListener("mouseover", over, { passive:true });
    document.addEventListener("mouseleave", leave);
    raf = requestAnimationFrame(loop);
  }

  // ---- entrance animations ----
  function revealAll(){
    var els = document.querySelectorAll("[data-reveal]");
    for (var i=0;i<els.length;i++){ els[i].style.opacity="1"; els[i].style.transform="none"; }
  }
  function initMotion(){
    var M = window.Motion;
    var cards = document.querySelectorAll("[data-reveal]");
    for (var i=0;i<cards.length;i++){
      (function(el, idx){
        M.inView(el, function(){
          M.animate(el, { opacity:[0,1], transform:["translateY(26px)","translateY(0px)"] },
            { duration:0.6, delay:(idx % 2) * 0.08, ease:[.22,1,.36,1] });
        }, { margin: "-8% 0px -8% 0px" });
      })(cards[i], i);
    }
  }
  var tries = 0;
  function startMotion(){
    if (!(window.Motion && window.Motion.animate)){
      if (tries++ < 40){ setTimeout(startMotion, 75); return; }
      return revealAll();
    }
    initMotion();
  }

  // ---- boot ----
  function openPost(i){ state.activePost = posts[i]; renderOverlay(); }
  function closePost(){ state.activePost = null; renderOverlay(); }

  function boot(){
    var stored = "dark";
    try { stored = localStorage.getItem("av-theme") || "dark"; } catch(e){}
    applyTheme(stored);
    bindHovers(document);
    renderPosts();
    initCursor();
    document.addEventListener("keydown", function(e){ if (e.key === "Escape") closePost(); });
    startMotion();
  }

  window.App = { toggleTheme: toggleTheme, openPost: openPost, closePost: closePost };

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
</body>
</html>
